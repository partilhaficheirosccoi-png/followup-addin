<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FollowUp Tracker</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f3f2f1;color:#201f1e;padding:16px;font-size:14px}
    h2{font-size:16px;font-weight:700;color:#0078d4;margin-bottom:3px}
    .sub{font-size:11px;color:#605e5c;margin-bottom:16px}
    .card{background:#fff;border-radius:6px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.09)}
    .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#605e5c;margin-bottom:10px}
    .ref-row{display:flex;align-items:center;gap:8px;background:#f3f2f1;border:1px solid #d2d0ce;border-radius:4px;padding:7px 10px;margin-bottom:10px}
    .ref-val{font-family:monospace;font-weight:700;color:#0078d4;font-size:12px;flex:1;word-break:break-all}
    .btn-regen{background:none;border:1px solid #d2d0ce;border-radius:4px;font-size:11px;padding:3px 8px;cursor:pointer;color:#605e5c}
    .btn-regen:hover{background:#edebe9}
    .btn{width:100%;padding:11px 12px;border:none;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;transition:background .15s,transform .1s;display:flex;align-items:center;gap:10px}
    .btn:last-child{margin-bottom:0}
    .btn:active{transform:scale(.98)}
    .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:auto;background:rgba(255,255,255,.25);color:#fff;white-space:nowrap}
    .btn-24{background:#0078d4;color:#fff}.btn-24:hover{background:#106ebe}
    .btn-48{background:#8764b8;color:#fff}.btn-48:hover{background:#744da9}
    .btn-24r{background:#005a9e;color:#fff}.btn-24r:hover{background:#004578}
    .btn-48r{background:#5c2d91;color:#fff}.btn-48r:hover{background:#4b0082}
    .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#107c10;color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
    .toast.err{background:#a4262c}
    .toast.show{opacity:1}
  </style>
</head>
<body>
  <h2>⏱ FollowUp Tracker</h2>
  <p class="sub">Tag invisível · categoria aplicada pelo Power Automate</p>

  <div class="card">
    <div class="card-title">🔵 Sem referência</div>
    <button class="btn btn-24" onclick="ins('$followup',null)">
      <span>🔵</span><span>Follow-Up 24h</span><span class="badge">$followup</span>
    </button>
    <button class="btn btn-48" onclick="ins('$followup48',null)">
      <span>🟣</span><span>Follow-Up 48h</span><span class="badge">$followup48</span>
    </button>
  </div>

  <div class="card">
    <div class="card-title">🔗 Com referência ligada</div>
    <div class="ref-row">
      <span style="font-size:11px;color:#605e5c;white-space:nowrap">REF:</span>
      <span class="ref-val" id="refVal">...</span>
      <button class="btn-regen" onclick="newRef()">🔄</button>
    </div>
    <button class="btn btn-24r" onclick="ins('$followup',currentRef)">
      <span>🔵</span><span>Follow-Up 24h + REF</span><span class="badge">$followup+REF</span>
    </button>
    <button class="btn btn-48r" onclick="ins('$followup48',currentRef)">
      <span>🟣</span><span>Follow-Up 48h + REF</span><span class="badge">$followup48+REF</span>
    </button>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    var currentRef='';
    function newRef(){
      var n=new Date(),p=function(x){return String(x).padStart(2,'0')};
      currentRef='REF-'+n.getFullYear()+p(n.getMonth()+1)+p(n.getDate())+'-'+(Math.floor(Math.random()*9000)+1000);
      document.getElementById('refVal').textContent=currentRef;
    }
    function toast(m,e){
      var t=document.getElementById('toast');
      t.textContent=m;t.className='toast'+(e?' err':'')+' show';
      setTimeout(function(){t.className='toast'+(e?' err':'')},2800);
    }
    function ins(tag,ref){
      var refStr=ref?' ['+ref+']':'';
      var hidden='<span style="font-size:1px;color:#ffffff;line-height:0;display:inline;">'+tag+refStr+'</span>';
      if(typeof Office==='undefined'||!Office.context){toast('[DEMO] '+tag+refStr,false);return;}
      Office.context.mailbox.item.body.getAsync(Office.CoercionType.Html,function(r){
        if(r.status!==Office.AsyncResultStatus.Succeeded){toast('Erro ao ler corpo',true);return;}
        var b=r.value;
        b=b.indexOf('</body>')>-1?b.replace('</body>',hidden+'</body>'):b+hidden;
        Office.context.mailbox.item.body.setAsync(b,{coercionType:Office.CoercionType.Html},function(s){
          if(s.status===Office.AsyncResultStatus.Succeeded){
            toast('✅ '+tag+(ref?' + '+ref:'')+' inserido!',false);
          } else {toast('Erro ao inserir',true);}
        });
      });
    }
    Office.onReady(function(){newRef();});
    newRef();
  </script>
</body>
</html>
